<section class="mast">
    <header class="mast__header">
        <div class="lottie" id="bm_404"></div>
        <script>
            function 404Reveal() {
                var anim;
                var load404 = {
                    container: document.getElementById('bm_404'),
                    renderer: 'svg',
                    loop: false,
                    autoplay: true,
                    path: '/assets/bodymovin/404.json'
                };
                anim = lottie.loadAnimation(load404);
                anim.play();
            }
            404Reveal();
        </script>
    </header>
</section>
