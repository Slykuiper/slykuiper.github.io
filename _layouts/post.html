---
layout: default
---
<article class="bg-black" itemprop="blogPost" itemscope itemtype="http://schema.org/BlogPosting">

    <header class="post-mast bg-alpha">
        <figure class="absolute-bg" style="background-image: url('{{ page.image }}');"></figure>
    </header>

    <div class="grid--double">
        <section class="post section-padding--half bg-black" itemprop="articleBody">
            <header class="post-header">
                <h1 itemprop="name headline">{{ page.title }}</h1>
                <time class="post-header__time" itemprop="datePublished" datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%b %-d, %Y" }}</time>
            </header>
            <div class="post-content">
                {{ content }}
            </div>

            {% if page.rscs.size > 0 %}
            <section class="section-padding bg-black">
                <div class="postgrid">
                    <div class="columns-wrapper">
                        <div class="columns">
                            {% for rsc in page.rscs %}
                                {% for item in rsc.rsc-items %}
                                <a href="{{ item.rsc-link }}">
                                    <div class="postcolumn" style="background-image: url({{ item.rsc-img }})">
                                        <div class="postcolumn__inner"><p>{{ item.rsc-name }}</p></div>
                                    </div>
                                </a>
                                {% endfor %}
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </section>
            {% endif %}

                <!--
           {% if page.tags.size > 0 %}
               <span class="post-content__tags">
                    Tags
                    {% for tag in page.tags %}
                    <a href="{{ site.baseurl }}/tag/{{ tag | downcase | slugify }}">{{ tag }}</a>{% if forloop.last == false %}, {% endif %}
                    {% endfor %}
                </span>
            {% endif %}
        -->
                <div class="container-btn">
                    <a class="btn" href="/archive">
                        <div>
                            <span>Archive</span>
                            <span>Archive</span>
                        </div>
                    </a>
                </div>
            </section>
</div>
</article>
