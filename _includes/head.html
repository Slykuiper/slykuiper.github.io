<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% if page.title %}{{ page.title | escape }} | {{ site.title }}{% else %}{{ site.title | escape }}{% endif %}</title>
    <meta name="author" content="{{ site.name }}">
    <meta name="description" content="{{ site.description }}">
    <meta property="og:title" content="{% if page.title %}{{ page.title | escape }} | {{ site.title }}{% else %}{{ site.title | escape }}{% endif %}">
    <meta property="og:url" content="{{ page.url | prepend: site.baseurl | prepend: site.url }}">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:image" content="{% if page.image %}{{ page.image }}{% else %}{{ site.default_img }}{% endif %}">

    <meta name="twitter:card" content="summary">
    <meta name="twitter:description" content="{% if page.description %}{{ page.description | escape }}{% else %}{{ site.description }}{% endif %}">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title | escape }} | {{ site.title }}{% else %}{{ site.title | escape }}{% endif %}">
    <meta name="twitter:url" content="{{ page.url | prepend: site.baseurl | prepend: site.url }}">
    <meta name="twitter:site" content="{{ site.title }}">
    <meta name="twitter:creator" content="@{{ site.twitter_username }}">
    <meta name="twitter:domain" content="{{ site.url }}">
    <meta property="twitter:image" content="{% if page.image %}{{ page.image }}{% else %}{{ site.default_img }}{% endif %}">

    <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Varela+Round|Nunito:400,700">
    <link rel="stylesheet" href="{{ '/assets/css/fontawesome-all.css' | prepend: site.baseurl }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.min.css' | prepend: site.baseurl }}">

    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | prepend: site.baseurl | prepend: site.url }}">
    <link rel="canonical" href="{{ page.url | replace: 'index.html', '' | prepend: site.baseurl | prepend: site.url }}">

    <script type="text/javascript">
        var array_sly = ["sly_acedia1.jpg", "sly_acedia2.jpg", "sly_acedia3.jpg", "sly_acedia4.jpg", "sly_amen1.jpg", "sly_amen2.jpg", "sly_amen3.jpg", "sly_amen4.jpg", "sly_amen5.jpg", "sly_amen6.jpg", "sly_amen7.jpg", "sly_anagnorisis1.jpg", "sly_anagnorisis2.jpg", "sly_anagnorisis3.jpg", "sly_anagnorisis4.jpg", "sly_anagnorisis5.jpg", "sly_kingdom1.jpg", "sly_kingdom2.jpg", "sly_kingdom3.jpg", "sly_kingdom4.jpg", "sly_kingdom5.jpg", "sly_wantme1.jpg", "sly_wantme2.jpg", "sly_wantme3.jpg", "sly_wantme4.jpg"];

        $(document).ready(function () {
            getRandomHeaderImage(array_sly, "/assets/images/videos/sly/");
        });

        function getRandomHeaderImage(imgArray, path) {
            path = path || '/assets/images/videos/'; // default path here
            var randNum = Math.floor(Math.random() * imgArray.length);
            var img = imgArray[randNum];
            $(".absolute_bg").css('background-image', 'url(' + path + img + ')');
        };
    </script>

    {% if site.google_analytics %}
    <script>
      (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
      (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
      m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
      })(window,document,'script','//www.google-analytics.com/analytics.js','ga');
      ga('create', '{{ site.google_analytics }}', 'auto');
      ga('send', 'pageview');
    </script>
    {% endif %}
</head>
